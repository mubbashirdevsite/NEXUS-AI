<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NEXUS AI</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="width: 100%; max-width: 400px;">
      <div style="text-align: center; margin-bottom: 3rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔑</div>
        <h1>Reset Password</h1>
        <p style="color: var(--text-secondary);">Enter your email to receive a password reset link</p>
      </div>

      <form id="reset-form" style="display: block;">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email-input" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
      </form>

      <form id="verify-form" style="display: none;">
        <p style="margin-bottom: 1rem; text-align: center;">We've sent a password reset link to your email</p>
        <div class="form-group">
          <label class="form-label">Enter Verification Code</label>
          <div style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
            <input type="text" maxlength="1" class="form-input" style="width: 40px; text-align: center; font-size: 1.5rem;">
          </div>
          <button type="button" class="btn btn-secondary" style="width: 100%;" onclick="showNewPasswordForm()">Verify Code</button>
        </div>
      </form>

      <form id="new-password-form" style="display: none;">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" placeholder="At least 8 characters" required>
          <small style="color: var(--text-secondary); font-size: 0.75rem; display: block; margin-top: 0.5rem;">
            ✓ At least 8 characters &nbsp; ✓ Mix of uppercase & lowercase
          </small>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" placeholder="Re-enter password" required>
        </div>

        <button type="button" class="btn btn-primary" style="width: 100%;" onclick="resetPassword()">Reset Password</button>
      </form>

      <div style="text-align: center; margin-top: 2rem;">
        <p style="color: var(--text-secondary);">Remember your password?</p>
        <a href="login.html" style="color: var(--accent); font-weight: 600;">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value;

      if (!FormValidator.email(email)) {
        Notification.error('Please enter a valid email');
        return;
      }

      // Show verification form
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('verify-form').style.display = 'block';
      
      Notification.success('Check your email for the verification code');
      Analytics.trackEvent('password_reset_requested', { email });
    });

    function showNewPasswordForm() {
      document.getElementById('verify-form').style.display = 'none';
      document.getElementById('new-password-form').style.display = 'block';
    }

    function resetPassword() {
      const newPassword = document.querySelector('#new-password-form input[type="password"]:first-of-type').value;
      const confirmPassword = document.querySelector('#new-password-form input[type="password"]:last-of-type').value;

      if (!FormValidator.password(newPassword)) {
        Notification.error('Password must be at least 8 characters');
        return;
      }

      if (newPassword !== confirmPassword) {
        Notification.error('Passwords do not match');
        return;
      }

      Notification.success('Password reset successfully! Redirecting to login...');
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);

      Analytics.trackEvent('password_reset_completed');
    }

    Analytics.trackPageView('/forgot-password');
  </script>
</body>
</html>
